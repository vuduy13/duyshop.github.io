<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopBacGau VIP</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;text-align:center;
}

button{
padding:10px;border:none;border-radius:10px;
background:#00e5ff;color:black;margin:5px;font-weight:bold;
}

input{
padding:10px;border-radius:10px;border:none;margin:5px;width:70%;
}

.card{
background:#000000aa;margin:10px;padding:10px;
border-radius:15px;box-shadow:0 0 10px #00e5ff;
}

img{width:100%;border-radius:10px;}

.page-btn{
padding:6px 10px;margin:2px;border-radius:6px;
background:#222;color:white;
}
.active-page{background:#00e5ff;color:black;}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
<h2>🐻‍❄️ ShopBacGau VIP</h2>
<input id="loginUser" placeholder="Tên"><br>
<input id="loginPass" placeholder="Mật khẩu"><br>
<button onclick="login()">Đăng nhập</button>
<p onclick="show('register')">Đăng ký</p>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
<h2>Đăng ký</h2>
<input id="regUser"><br>
<input id="regPass"><br>
<button onclick="register()">Tạo</button>
<button onclick="show('login')">⬅️</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<h2>🐻‍❄️ ShopBacGau</h2>
<p>💰 <span id="money"></span>đ</p>

<button onclick="showFF()">🔥 Free Fire</button>
<button onclick="showLQ()">⚔️ Liên Quân</button>
<button onclick="showRB()">🟫 Roblox</button>

<button onclick="showProfile()">👤 Cá nhân</button>
<button onclick="logout()">🚪</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2>👤 Thông tin</h2>
<p id="info"></p>
<button onclick="show('shop')">⬅️</button>
</div>

<!-- LIST -->
<div id="list" class="screen">
<h2 id="title"></h2>
<div id="accList"></div>
<div id="page"></div>
<button onclick="show('shop')">⬅️</button>
</div>

<script>

// AUTO LOGIN
let currentUser = localStorage.getItem("lastUser");

// ADMIN
const ADMIN_USER="admin";
const ADMIN_PASS="123456";

// LOAD USER
function load(){return JSON.parse(localStorage.getItem("user_"+currentUser));}
function save(d){localStorage.setItem("user_"+currentUser,JSON.stringify(d));}

// LOGIN
function login(){
let u=loginUser.value,p=loginPass.value;

if(u==ADMIN_USER && p==ADMIN_PASS){
currentUser=u;
localStorage.setItem("lastUser",u);

if(!localStorage.getItem("user_"+u)){
localStorage.setItem("user_"+u,JSON.stringify({
money:10000000000,
ff:genFF(),
lq:genLQ(),
rb:genRB()
}));
}

show("shop");
updateMoney();
return;
}

if(localStorage.getItem("acc_"+u)==p){
currentUser=u;
localStorage.setItem("lastUser",u);

if(!localStorage.getItem("user_"+u)){
localStorage.setItem("user_"+u,JSON.stringify({
money:0,
ff:genFF(),
lq:genLQ(),
rb:genRB()
}));
}

show("shop");
updateMoney();
}else alert("Sai");
}

// REGISTER
function register(){
localStorage.setItem("acc_"+regUser.value,regPass.value);
alert("OK");
show("login");
}

// LOGOUT
function logout(){
localStorage.removeItem("lastUser");
show("login");
}

// MONEY
function updateMoney(){money.innerText=load().money;}

// PROFILE
function showProfile(){
info.innerText="User: "+currentUser+" | Tiền: "+load().money;
show("profile");
}

// GEN ACC
function genFF(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"FF"+i,price:100000,img:"https://i.imgur.com/3ZQ3Z4K.jpg"});
}
return arr;
}
function genLQ(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"LQ"+i,price:150000,img:"https://i.imgur.com/8Qf7YkC.jpg"});
}
return arr;
}
function genRB(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"RB"+i,price:200000,img:"https://i.imgur.com/6RL9J0K.jpg"});
}
return arr;
}

// LIST
let data=[],pageIndex=1;

function showFF(){data=load().ff;title.innerText="Free Fire";render();show("list");}
function showLQ(){data=load().lq;title.innerText="Liên Quân";render();show("list");}
function showRB(){data=load().rb;title.innerText="Roblox";render();show("list");}

function render(){
let start=(pageIndex-1)*10;
let list=data.slice(start,start+10);

let html="";
list.forEach(a=>{
html+=`
<div class="card">
<img src="${a.img}">
<h3>${a.id}</h3>
<p>${a.price}đ</p>
<button onclick="buy('${a.id}')">Mua</button>
</div>`;
});
accList.innerHTML=html;

let total=Math.ceil(data.length/10);
let p="";
for(let i=1;i<=total;i++){
p+=`<span class="page-btn ${i==pageIndex?'active-page':''}" onclick="go(${i})">${i}</span>`;
}
page.innerHTML=p;
}

function go(p){pageIndex=p;render();}

// BUY
function buy(id){
let d=load();
let list=d.ff.concat(d.lq,d.rb);
let acc=list.find(a=>a.id==id);

if(d.money<acc.price){alert("Không đủ tiền");return;}

d.money-=acc.price;

d.ff=d.ff.filter(a=>a.id!=id);
d.lq=d.lq.filter(a=>a.id!=id);
d.rb=d.rb.filter(a=>a.id!=id);

save(d);
updateMoney();
alert("Mua thành công");
}

// NAV
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// AUTO LOGIN START
if(currentUser){
show("shop");
updateMoney();
}else{
show("login");
}

</script>

</body>
</html>
