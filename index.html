<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopBacGau</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00e5ff;
}
.logo{font-weight:bold;font-size:18px;}
.menu button{
background:none;border:none;color:white;margin:5px;font-size:14px;
}

/* BANNER */
.banner{
height:140px;
background:url("https://i.imgur.com/Z6X9QpK.jpg") center/cover;
}

/* MONEY */
.money{
padding:10px;
color:#00e5ff;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:#020617;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px #00e5ff33;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.card h3{
margin:5px;
font-size:13px;
}

.price{
color:#00e5ff;
font-weight:bold;
margin:5px;
}

.buy{
background:#00e5ff;
color:black;
width:90%;
margin:5px auto 10px;
display:block;
border-radius:8px;
}

/* PAGINATION */
.page-btn{
padding:6px 10px;
margin:2px;
background:#111;
border-radius:6px;
}
.active-page{background:#00e5ff;color:black;}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active" style="text-align:center;padding-top:100px;">
<h2>🐻‍❄️ ShopBacGau</h2>
<input id="loginUser" placeholder="Tên"><br><br>
<input id="loginPass" placeholder="Mật khẩu"><br><br>
<button onclick="login()">Đăng nhập</button>
<p onclick="show('register')">Đăng ký</p>
</div>

<!-- REGISTER -->
<div id="register" class="screen" style="text-align:center;padding-top:100px;">
<h2>Đăng ký</h2>
<input id="regUser"><br><br>
<input id="regPass"><br><br>
<button onclick="register()">Tạo</button>
<button onclick="show('login')">⬅️</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">

<div class="header">
<div class="logo">🐻‍❄️ ShopBacGau</div>
<div class="menu">
<button onclick="showFF()">Free Fire</button>
<button onclick="showLQ()">Liên Quân</button>
<button onclick="showRB()">Roblox</button>
<button onclick="logout()">Thoát</button>
</div>
</div>

<div class="banner"></div>

<div class="money">💰 <span id="money"></span>đ</div>

<div id="accList"></div>
<div id="page"></div>

</div>

<script>

// USER
let currentUser=null;

function register(){
localStorage.setItem("acc_"+regUser.value,regPass.value);
alert("OK");
show("login");
}

function login(){
let u=loginUser.value,p=loginPass.value;

if(localStorage.getItem("acc_"+u)==p){
currentUser=u;

if(!localStorage.getItem("user_"+u)){
localStorage.setItem("user_"+u,JSON.stringify({
money:0,
ff:genFF(),
lq:genLQ(),
rb:genRB()
}));
}

updateMoney();
show("shop");
}else alert("Sai");
}

function logout(){show("login");}

// DATA
function load(){return JSON.parse(localStorage.getItem("user_"+currentUser));}
function save(d){localStorage.setItem("user_"+currentUser,JSON.stringify(d));}
function updateMoney(){money.innerText=load().money;}

// GEN ACC
function genFF(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"FF"+i,price:100000,img:"https://i.imgur.com/3ZQ3Z4K.jpg"});
}
return arr;
}
function genLQ(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"LQ"+i,price:150000,img:"https://i.imgur.com/8Qf7YkC.jpg"});
}
return arr;
}
function genRB(){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:"RB"+i,price:200000,img:"https://i.imgur.com/6RL9J0K.jpg"});
}
return arr;
}

// LIST
let data=[],pageIndex=1;

function showFF(){data=load().ff;render();}
function showLQ(){data=load().lq;render();}
function showRB(){data=load().rb;render();}

function render(){
let start=(pageIndex-1)*10;
let list=data.slice(start,start+10);

let html=`<div class="grid">`;

list.forEach(a=>{
html+=`
<div class="card">
<img src="${a.img}">
<h3>${a.id}</h3>
<p class="price">${a.price}đ</p>
<button class="buy" onclick="buy('${a.id}')">MUA NGAY</button>
</div>`;
});

html+=`</div>`;
accList.innerHTML=html;

let total=Math.ceil(data.length/10);
let p="";
for(let i=1;i<=total;i++){
p+=`<span class="page-btn ${i==pageIndex?'active-page':''}" onclick="go(${i})">${i}</span>`;
}
page.innerHTML=p;
}

function go(p){pageIndex=p;render();}

// BUY
function buy(id){
let d=load();
let all=[...d.ff,...d.lq,...d.rb];
let acc=all.find(a=>a.id==id);

if(d.money<acc.price){alert("Không đủ tiền");return;}

d.money-=acc.price;
d.ff=d.ff.filter(a=>a.id!=id);
d.lq=d.lq.filter(a=>a.id!=id);
d.rb=d.rb.filter(a=>a.id!=id);

save(d);
updateMoney();
alert("Mua thành công");
}

// NAV
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
