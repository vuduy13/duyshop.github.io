<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoTus Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  text-align:center;
  padding:15px;
  background:linear-gradient(90deg,#000,#ff0000);
  font-size:24px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#141414;
  margin:10px;
  padding:10px;
  width:220px;
  border-radius:15px;
  box-shadow:0 0 20px red;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  border-radius:10px;
}

.price{
  color:#ff3b3b;
  font-weight:bold;
}

.badge{
  font-size:12px;
  color:#00ff88;
}

button{
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  width:100%;
}

/* popup */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
}

.modal-content{
  background:#1a1a1a;
  margin:20% auto;
  padding:20px;
  width:85%;
  border-radius:15px;
  text-align:center;
}

</style>
</head>

<body>

<header>🔥 LoTus Shop 🔥</header>

<div class="container">

<div class="card" onclick="openAcc('ACC001','Free Fire VIP','Full skin súng + rank cao','500000','https://picsum.photos/300?1')">
<img src="https://picsum.photos/300?1">
<h3>Acc FF VIP</h3>
<p class="price">500K</p>
<div class="badge">✔ Còn hàng</div>
<button>Xem</button>
</div>

<div class="card" onclick="openAcc('ACC002','Free Fire Siêu VIP','Full skin hiếm','1000000','https://picsum.photos/300?2')">
<img src="https://picsum.photos/300?2">
<h3>Acc FF Siêu VIP</h3>
<p class="price">1TR</p>
<div class="badge">✔ Còn hàng</div>
<button>Xem</button>
</div>

<div class="card" onclick="openAcc('ACC003','Liên Quân VIP','Full tướng + skin','800000','https://picsum.photos/300?3')">
<img src="https://picsum.photos/300?3">
<h3>Acc LQ VIP</h3>
<p class="price">800K</p>
<div class="badge">✔ Còn hàng</div>
<button>Xem</button>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="randomAcc()">🎁 Random Acc (50K)</button>
</div>

<!-- popup -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="name"></h2>
    <img id="img" style="width:100%;border-radius:10px;">
    <p id="desc"></p>
    <p id="price"></p>

    <button onclick="fakePay()">💳 Thanh toán</button>
    <button onclick="zalo()">📱 Liên hệ Zalo</button>
  </div>
</div>

<script>
let currentPrice=0;

function openAcc(id,name,desc,price,img){
  document.getElementById("modal").style.display="block";
  document.getElementById("name").innerText=name+" ("+id+")";
  document.getElementById("desc").innerText=desc;
  document.getElementById("price").innerText="Giá: "+price+"đ";
  document.getElementById("img").src=img;
  currentPrice=price;
}

function fakePay(){
  alert("Thanh toán thành công! (fake 😎)");
}

function zalo(){
  window.location.href="https://zalo.me/0896597443";
}

function randomAcc(){
  let list=["ACC RANDOM VIP","ACC MAY MẮN","ACC SIÊU HIẾM"];
  let pick=list[Math.floor(Math.random()*list.length)];
  alert("Bạn nhận được: "+pick);
}

window.onclick=function(e){
  if(e.target==document.getElementById("modal")){
    document.getElementById("modal").style.display="none";
  }
}
</script>

</body>
</html>
