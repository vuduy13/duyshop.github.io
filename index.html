<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopBacGau Ultimate</title>

<style>
body{
margin:0;
font-family:Arial;
background:#e9f2f7;
}

/* LOGIN */
.box{
background:white;
padding:25px;
margin:80px auto;
width:85%;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px #ccc;
animation:fade 0.8s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}

input{
padding:12px;
margin:8px;
width:80%;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px;
width:80%;
border:none;
border-radius:10px;
background:#00bcd4;
color:white;
font-weight:bold;
}

/* HEADER */
.header{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px #ccc;
}

/* BANNER */
.banner{
height:140px;
background:url("https://wallpapercave.com/wp/wp5128415.jpg") center/cover;
border-radius:15px;
margin:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
overflow:hidden;
border:2px solid #00e5ff;
box-shadow:0 0 10px #00e5ff33;
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card h3{
font-size:14px;
padding:5px;
color:#333;
}

.sold{
color:red;
font-size:12px;
padding-left:5px;
}

.btn{
background:linear-gradient(90deg,orange,red);
color:white;
text-align:center;
padding:8px;
margin:10px;
border-radius:20px;
font-weight:bold;
}

/* PAGE */
.page{
text-align:center;
}
.page span{
background:#333;
color:white;
padding:5px 10px;
margin:3px;
border-radius:6px;
}
.active-page{
background:#00bcd4;
}

/* PROFILE */
.profile{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

/* NAV */
.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<div class="box">
<h2>🐻‍❄️ ShopBacGau</h2>
<input id="loginUser" placeholder="Tên">
<input id="loginPass" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>
<button onclick="show('register')">Đăng ký</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
<div class="box">
<h2>Đăng ký</h2>
<input id="regUser">
<input id="regPass">
<button onclick="register()">Tạo</button>
<button onclick="show('login')">⬅️</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">

<div class="header">
<b>🐻‍❄️ ShopBacGau</b>
<div>
💰 <span id="money"></span>đ |
<button onclick="profile()">👤</button>
<button onclick="nap()">💰</button>
<button onclick="spin()">🎁</button>
<button onclick="logout()">Thoát</button>
</div>
</div>

<div class="banner"></div>

<div class="grid">

<div class="card" onclick="loadFF()">
<img src="https://cdn2.unrealengine.com/freefire-1920x1080.jpg">
<h3>Acc Free Fire</h3>
<p class="sold">Đã bán 5000+</p>
<div class="btn">XEM TẤT CẢ</div>
</div>

<div class="card" onclick="loadLQ()">
<img src="https://cdn.vn.garenanow.com/web/lienquan/images/bg-index.jpg">
<h3>Acc Liên Quân</h3>
<p class="sold">Đã bán 3000+</p>
<div class="btn">XEM TẤT CẢ</div>
</div>

<div class="card" onclick="loadRB()">
<img src="https://tr.rbxcdn.com/768/432/Image/Webp">
<h3>Acc Roblox</h3>
<p class="sold">Đã bán 2000+</p>
<div class="btn">XEM TẤT CẢ</div>
</div>

</div>

<div id="list"></div>
<div id="page" class="page"></div>

</div>

<script>

// ADMIN
const ADMIN="admin";
const PASS="123456";

let current=localStorage.getItem("user");
let data=[],pageIndex=1;

// LOGIN
function login(){
let u=loginUser.value,p=loginPass.value;

if(u==ADMIN && p==PASS){
localStorage.setItem("user",u);
localStorage.setItem("money",10000000000);
start();
return;
}

if(localStorage.getItem("acc_"+u)==p){
localStorage.setItem("user",u);
if(!localStorage.getItem("money")) localStorage.setItem("money",0);
start();
}else alert("Sai");
}

// REGISTER
function register(){
localStorage.setItem("acc_"+regUser.value,regPass.value);
alert("OK");
show("login");
}

// START
function start(){
show("shop");
money.innerText=localStorage.getItem("money");
}

// LOAD DATA
function gen(type,price){
let arr=[];
for(let i=1;i<=50;i++){
arr.push({id:type+i,price:price});
}
return arr;
}

function loadFF(){data=gen("FF",100000);render();}
function loadLQ(){data=gen("LQ",150000);render();}
function loadRB(){data=gen("RB",200000);render();}

// RENDER
function render(){
let start=(pageIndex-1)*10;
let html='<div class="grid">';
data.slice(start,start+10).forEach(a=>{
html+=`
<div class="card">
<img src="https://cdn2.unrealengine.com/freefire-1920x1080.jpg">
<h3>${a.id}</h3>
<p class="sold">${a.price}đ</p>
<div class="btn" onclick="buy('${a.id}',${a.price})">MUA</div>
</div>`;
});
html+='</div>';
list.innerHTML=html;

// PAGE
let total=Math.ceil(data.length/10);
let p="";
for(let i=1;i<=total;i++){
p+=`<span class="${i==pageIndex?'active-page':''}" onclick="go(${i})">${i}</span>`;
}
page.innerHTML=p;
}

function go(i){pageIndex=i;render();}

// BUY
function buy(id,price){
let m=parseInt(localStorage.getItem("money"));
if(m<price){alert("Không đủ tiền");return;}
m-=price;
localStorage.setItem("money",m);
money.innerText=m;
alert("Mua thành công\nTK: demo"+id+"\nMK:123456");
}

// PROFILE
function profile(){
alert("User: "+localStorage.getItem("user")+"\nTiền: "+localStorage.getItem("money"));
}

// NẠP
function nap(){
let m=parseInt(localStorage.getItem("money"));
m+=500000;
localStorage.setItem("money",m);
money.innerText=m;
alert("Nạp +500K");
}

// SPIN
function spin(){
let m=parseInt(localStorage.getItem("money"));
let r=Math.floor(Math.random()*200000);
m+=r;
localStorage.setItem("money",m);
money.innerText=m;
alert("Trúng "+r);
}

// LOGOUT
function logout(){
localStorage.removeItem("user");
show("login");
}

// NAV
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// AUTO
if(current){start();}else{show("login");}

</script>

</body>
</html>
